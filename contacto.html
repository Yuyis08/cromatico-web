<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto | Cromático</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/css/contacto.css">
<link rel="icon" href="./negro.png">

<!--MANIFIESTO-->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#6a0dad">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="header-hover-zone"></div>
<header>
    <div class="contain-logo">
        <img class="logo" src="./croma.png" alt="Cromático" width="40" height="40">
        <h3 class="titulo">Imprenta Cromático</h3>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        ☰
    </div>

    <nav class="menu">
        <a href="./index.html">Inicio</a>
        <a href="./catálogo.html">Catálogo</a>
        <a href="./about.html">Acerca de</a>
    </nav>
</header><br>

<section class="contacto">

    <div class="contacto-wrapper">

        <!-- IZQUIERDA -->
        <div class="contacto-info">

            <div class="linea"></div>

            <h1>Pongamos en marcha tu idea</h1>

            <p>
                Cada identidad visual comienza con una idea.
                En <strong>Cromático</strong> diseñamos con intención,
                estrategia y carácter visual.
            </p>

            <div class="info-extra">
                <p><i class="fas fa-envelope"></i> cromaticodg.22@gmail.com</p>

                <div class="iconos-contacto">
                    <a href="https://wa.me/524581195339" target="_blank" class="icono-btn">
                        <i class="fab fa-whatsapp"></i>
                    </a>

                    <a href="https://www.facebook.com/cromatico.disenografico/" target="_blank" class="icono-btn">
                        <i class="fab fa-facebook-f"></i>
                    </a>

                    <button class="icono-btn location-btn" type="button">
                        <i class="fas fa-location-dot"></i>
                    </button>
                </div>
            </div>

        </div>

        <!-- DERECHA -->
        <div class="contacto-form">

            <form id="formulario">

                <select id="tipo" required>
                    <option value="" disabled selected>¿Qué tipo de proyecto necesitas?</option>
                    <option value="Impresión">Impresión (invitaciones, recetas, tarjetas, etc.)</option>
                    <option value="Textiles personalizados">Textiles personalizados</option>
                    <option value="Productos personalizados">Productos personalizados</option>
                    <option value="Gran formato">Gran formato</option>
                    <option value="Otro">Otro</option>
                </select>

                <textarea id="mensaje" placeholder="Describe tu proyecto o idea..." required></textarea>

                <input type="text" id="fecha" placeholder="¿Para cuándo lo necesitas?">

                <button type="submit">Enviar por WhatsApp</button>

            </form>

        </div>

    </div>

</section>

<!-- MODAL MAPA -->
<div class="modal" id="modalMapa">
    <div class="modal-contenido">
        <span class="cerrar">&times;</span>

        <iframe src="https://www.google.com/maps/embed?pb=!4v1771888565064!6m8!1m7!1sdKtng2zox12Znq-n68ZXqg!2m2!1d22.57113713633387!2d-102.2539159047143!3f139.83695422686162!4f-8.07832340049228!5f0.7820865974627469" 
                width="600" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</div>

<script>
/* MODAL */
const modal = document.getElementById("modalMapa");
const btnUbicacion = document.querySelector(".location-btn");
const cerrar = document.querySelector(".cerrar");

btnUbicacion.addEventListener("click", () => {
    modal.style.display = "flex";
});

cerrar.addEventListener("click", () => {
    modal.style.display = "none";
});

window.addEventListener("click", (e) => {
    if(e.target === modal){
        modal.style.display = "none";
    }
});

/* WHATSAPP */
document.getElementById("formulario").addEventListener("submit", function(e){
    e.preventDefault();

    const tipo = document.getElementById("tipo").value;
    const mensaje = document.getElementById("mensaje").value;
    const fecha = document.getElementById("fecha").value || "Por definir";

    const texto = `Hola, me interesa un proyecto de ${tipo}.
Descripción: ${mensaje}
Fecha estimada: ${fecha}`;

    const numero = "524581195339"; // NÚMERO IMPRENTA

    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(texto)}`, "_blank");
});
</script>

<script> //Menú símbolo
function toggleMenu() {
  const menu = document.querySelector(".menu");
  const toggle = document.querySelector(".menu-toggle");

  menu.classList.toggle("active");

  // cambiar icono
  if (menu.classList.contains("active")) {
    toggle.textContent = "✕";
  } else {
    toggle.textContent = "☰";
  }
}

//REGISTRO DE SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(() => console.log("Service Worker registrado"))
    .catch(error => console.log("Error:", error));
}

</script>

</body>
</html>
